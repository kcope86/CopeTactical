<!DOCTYPE html>
<html>
<head>
    <title>Contact Cope Tactical</title>

    <style>

        body {
            background-color: black;
            color: #e0e0e0;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* ===== Layout wrapper ===== */

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layout {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 30px;
    width: 100%;
    max-width: 1400px;
}

        /* ===== Side logos ===== */

        .side {
    flex: 1;
    max-width: 400px;
    display: flex;
    align-items: stretch;
    justify-content: center;
}

        .side img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.35;
}

        .right img {
            transform: scaleX(-1);
        }

        /* ===== Form card ===== */

        .form-card {
            width: 100%;
            max-width: 700px;
            background-color: #111;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 28px;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 28px;
        }

        .form-row {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
        }

        input,
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: #1a1a1a;
            color: #f0f0f0;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }

        textarea {
            min-height: 160px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .send-button {
            background-color: #6b8e23;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cancel-link {
            background-color: #333;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
        }

        .note {
            margin-top: 14px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        /* ===== Responsive ===== */

        @media (max-width: 1100px) {

            .side {
                display: none;
            }

            .layout {
                padding: 20px;
            }

        }

    </style>
</head>

<body>

<div class="page">

    <div class="layout">

        <!-- LEFT IMAGE -->
        <div class="side left">
            <img src="logo-mono.png">
        </div>


        <!-- FORM -->
        <div class="form-card">

            <h1>Contact Cope Tactical</h1>
            <div class="subtitle">
                Fill out the form below to draft your email.
            </div>

            <form id="contactForm">

                <div class="form-row">
                    <label>To:</label>
                    <select id="to">
                        <option value="sales@copetactical.com">
                            sales@copetactical.com
                        </option>

                        <option value="support@copetactical.com">
                            support@copetactical.com
                        </option>
                    </select>
                </div>

                <div class="form-row">
                    <label>From:</label>
                    <input id="from" type="email" required>
                </div>

                <div class="form-row">
                    <label>Subject:</label>
                    <input id="subject" required>
                </div>

                <div class="form-row">
                    <label>Body:</label>
                    <textarea id="body" required></textarea>
                </div>

                <div class="button-row">
                    <button class="send-button" type="submit">
                        Send
                    </button>

                    <a href="index.html" class="cancel-link">
                        Cancel
                    </a>
                </div>

            </form>

            <div class="note">
                Clicking Send will open your email app.
            </div>

        </div>


        <!-- RIGHT IMAGE -->
        <div class="side">
            <img src="logo-mono.png">
        </div>


    </div>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const toParam = params.get("to");

if (toParam)
{
    document.getElementById("to").value = toParam;
}

document.getElementById("contactForm")
.addEventListener("submit", function(e)
{
    e.preventDefault();

    const to =
        document.getElementById("to").value;

    const from =
        document.getElementById("from").value;

    const subject =
        document.getElementById("subject").value;

    const body =
        document.getElementById("body").value;

    const text =
        body + "\n\nFrom: " + from;

    const url =
        "mailto:" + to +
        "?subject=" + encodeURIComponent(subject) +
        "&body=" + encodeURIComponent(text);

    window.location.href = url;
});

</script>


</body>
</html>
